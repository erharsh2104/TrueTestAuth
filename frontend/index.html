<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>TypeProctor Widget</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --brand: #5b5ef4;
    --brand-dark: #4338ca;
    --brand-glow: rgba(91,94,244,0.35);
    --navy: #0c1220;
    --surface: rgba(255,255,255,0.05);
    --surface-2: rgba(255,255,255,0.08);
    --border: rgba(255,255,255,0.08);
    --border-hover: rgba(91,94,244,0.35);
    --text: #e2e8f0;
    --text-muted: #64748b;
    --green: #22c55e;
    --amber: #f59e0b;
    --red: #ef4444;
    --radius: 14px;
    --radius-sm: 10px;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    color: var(--text);
    background: transparent;
    font-size: 14px;
    line-height: 1.5;
  }

  /* Cards & surfaces */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1rem 1.25rem;
  }

  /* Enrollment phrase box */
  .phrase {
    background: rgba(91,94,244,0.10);
    border: 1px solid rgba(91,94,244,0.25);
    border-radius: var(--radius-sm);
    padding: 0.85rem 1rem;
    margin-bottom: 0.75rem;
  }
  .phrase-text {
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    color: #a5b4fc;
    font-size: 1rem;
    margin-top: 0.3rem;
    letter-spacing: 0.01em;
  }

  /* Labels & inputs */
  label.lbl {
    font-weight: 600;
    color: #94a3b8;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    display: block;
    margin-top: 0.5rem;
    margin-bottom: 0.3rem;
  }
  input.txt, select.sel, textarea.ta {
    width: 100%;
    padding: 0.65rem 0.9rem;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    font-size: 0.9rem;
    font-family: inherit;
    background: var(--surface-2);
    color: var(--text);
    transition: border-color 0.2s, box-shadow 0.2s;
    outline: none;
  }
  input.txt:focus, select.sel:focus, textarea.ta:focus {
    border-color: var(--brand);
    box-shadow: 0 0 0 3px var(--brand-glow);
  }
  input.typebox {
    border: 2px solid var(--brand);
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    background: rgba(91,94,244,0.08);
    color: white;
    letter-spacing: 0.01em;
  }
  input.typebox:focus { box-shadow: 0 0 0 3px var(--brand-glow); }
  textarea.ta { resize: vertical; min-height: 90px; }

  /* Buttons */
  button.btn {
    background: var(--brand);
    color: white;
    border: 0;
    padding: 0.6rem 1.4rem;
    border-radius: var(--radius-sm);
    font-weight: 700;
    font-size: 0.875rem;
    cursor: pointer;
    transition: transform 0.18s ease, box-shadow 0.18s ease, background 0.18s;
    letter-spacing: 0.01em;
    box-shadow: 0 2px 8px rgba(91,94,244,0.3);
  }
  button.btn:hover {
    transform: translateY(-1px);
    box-shadow: 0 8px 20px rgba(91,94,244,0.45);
  }
  button.btn:active { transform: translateY(0); }
  button.btn.ghost {
    background: rgba(255,255,255,0.07);
    color: #94a3b8;
    border: 1px solid var(--border);
    box-shadow: none;
  }
  button.btn.ghost:hover { background: rgba(255,255,255,0.11); color: var(--text); }
  button.btn.danger  { background: var(--red); box-shadow: 0 2px 8px rgba(239,68,68,0.3); }
  button.btn.danger:hover { box-shadow: 0 8px 20px rgba(239,68,68,0.45); }
  button.btn.success {
    background: var(--green);
    box-shadow: 0 2px 8px rgba(34,197,94,0.3);
  }
  button.btn.success:hover { box-shadow: 0 8px 20px rgba(34,197,94,0.45); }

  /* Messages */
  .msg { margin-left: 0.75rem; color: #f87171; font-size: 0.875rem; }
  .ok-msg { color: #4ade80; }
  .row { display: flex; gap: 0.6rem; align-items: center; flex-wrap: wrap; margin-top: 0.85rem; }
  .progress-line { color: var(--text-muted); margin-bottom: 0.5rem; font-size: 13px; }

  /* Question cards */
  .qcard {
    background: var(--surface);
    border: 1px solid var(--border);
    border-left: 3px solid var(--brand);
    border-radius: var(--radius);
    padding: 1rem 1.25rem;
    margin-bottom: 0.85rem;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .qcard:hover { border-color: var(--border-hover); box-shadow: 0 4px 16px rgba(0,0,0,0.2); }
  .qlabel {
    font-size: 11px;
    color: #818cf8;
    font-weight: 700;
    letter-spacing: 0.07em;
    text-transform: uppercase;
  }
  .qmarks {
    float: right;
    background: rgba(91,94,244,0.15);
    color: #a5b4fc;
    border: 1px solid rgba(91,94,244,0.25);
    padding: 2px 9px;
    border-radius: 999px;
    font-size: 11px;
    font-weight: 700;
  }
  .qtext { margin: 0.45rem 0 0.65rem 0; color: #e2e8f0; font-size: 14px; line-height: 1.6; }

  /* MCQ options */
  .mcq-opt {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 12px;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    margin: 5px 0;
    cursor: pointer;
    background: rgba(255,255,255,0.03);
    transition: background 0.15s, border-color 0.15s, transform 0.15s;
    color: #cbd5e1;
    font-size: 13.5px;
  }
  .mcq-opt input { margin: 0; accent-color: var(--brand); }
  .mcq-opt:hover {
    background: rgba(91,94,244,0.08);
    border-color: rgba(91,94,244,0.3);
    transform: translateX(2px);
  }
  .mcq-opt.selected {
    background: rgba(91,94,244,0.12);
    border-color: rgba(91,94,244,0.4);
    color: white;
  }

  /* Challenge / identity verification box */
  .challenge {
    background: rgba(239,68,68,0.08);
    border: 1px solid rgba(239,68,68,0.25);
    border-radius: var(--radius);
    padding: 1rem 1.25rem;
  }
  .challenge h3 { color: #f87171; margin: 0 0 0.4rem 0; font-size: 15px; font-weight: 700; }
  .challenge p  { color: #fca5a5; margin: 0 0 0.6rem 0; font-size: 13.5px; line-height: 1.6; }

  /* ── Lab editor ──────────────────────────────────────────────────────── */
  .lab-shell {
    background: #0d1117;
    border: 1px solid #21262d;
    border-radius: var(--radius);
    overflow: hidden;
    box-shadow: 0 4px 24px rgba(0,0,0,0.4);
  }
  .lab-topbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: #161b22;
    border-bottom: 1px solid #21262d;
    padding: 0.6rem 1rem;
    color: #8b949e;
    font-size: 13px;
  }
  .lab-topbar .lang-pill {
    background: rgba(110,118,129,0.2);
    color: #8b949e;
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 0.7rem;
    padding: 0.2rem 0.6rem;
    border-radius: 999px;
    letter-spacing: 0.06em;
    margin-right: 0.5rem;
    border: 1px solid rgba(110,118,129,0.3);
  }
  .lab-status-line {
    display: flex;
    gap: 0.5rem;
    align-items: center;
    font-size: 12px;
  }
  .editor-row { display: flex; }
  .lineno-strip {
    background: #0d1117;
    color: #3d4452;
    font-family: 'JetBrains Mono', 'Fira Code', ui-monospace, monospace;
    font-size: 13px;
    line-height: 1.65;
    padding: 16px 10px;
    text-align: right;
    user-select: none;
    border-right: 1px solid #21262d;
    min-width: 46px;
  }
  textarea.code-area {
    flex: 1;
    font-family: 'JetBrains Mono', 'Fira Code', 'Courier New', monospace;
    font-size: 13.5px;
    line-height: 1.65;
    background: #0d1117;
    color: #e6edf3;
    border: 0;
    padding: 16px;
    caret-color: #58a6ff;
    resize: vertical;
    min-height: 380px;
    outline: none;
    tab-size: 2;
  }
  textarea.stdin-area {
    width: 100%;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    background: #161b22;
    color: #8b949e;
    border: 1px solid #21262d;
    border-radius: 8px;
    padding: 10px;
    margin-top: 0.4rem;
    resize: vertical;
    min-height: 60px;
    outline: none;
    transition: border-color 0.2s;
  }
  textarea.stdin-area:focus { border-color: var(--brand); }
  .lab-actions {
    display: flex;
    gap: 0.5rem;
    padding: 0.65rem 1rem;
    background: #161b22;
    border-top: 1px solid #21262d;
    align-items: center;
  }
  .lab-actions button {
    border: 0;
    border-radius: 8px;
    padding: 0.55rem 1.2rem;
    font-weight: 700;
    cursor: pointer;
    font-size: 0.83rem;
    letter-spacing: 0.01em;
    transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s;
  }
  .lab-actions button:hover { transform: translateY(-1px); opacity: 0.9; }
  .lab-actions .btn-run    { background: #1f6feb; color: white; box-shadow: 0 2px 8px rgba(31,111,235,0.3); }
  .lab-actions .btn-run:hover { box-shadow: 0 6px 16px rgba(31,111,235,0.4); }
  .lab-actions .btn-submit { background: #238636; color: white; box-shadow: 0 2px 8px rgba(35,134,54,0.3); }
  .lab-actions .btn-submit:hover { box-shadow: 0 6px 16px rgba(35,134,54,0.4); }
  .lab-actions .btn-reset  { background: rgba(110,118,129,0.15); color: #8b949e; border: 1px solid #30363d; }
  .lab-actions .btn-reset:hover { background: rgba(110,118,129,0.25); color: #e6edf3; }
  .lab-actions .spacer     { flex: 1; }
  .lab-actions .stdin-toggle {
    background: transparent;
    color: #8b949e;
    text-decoration: none;
    padding: 0.4rem 0.75rem;
    font-size: 12px;
    border: 1px solid #30363d;
    border-radius: 6px;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
  }
  .lab-actions .stdin-toggle:hover { background: rgba(110,118,129,0.15); color: #e6edf3; }

  /* Terminal output */
  .terminal-output {
    background: #0d1117;
    color: #3fb950;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    padding: 16px;
    border-radius: 0 0 var(--radius) var(--radius);
    border-top: 1px solid #21262d;
    min-height: 64px;
    white-space: pre-wrap;
    word-break: break-all;
    margin: 0;
    line-height: 1.65;
  }
  .compile-error {
    background: #1a0a0a;
    color: #f85149;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    padding: 16px;
    border-radius: 0 0 var(--radius) var(--radius);
    border-top: 1px solid rgba(248,81,73,0.3);
    white-space: pre-wrap;
    margin: 0;
    line-height: 1.65;
  }
  .engine-pill {
    display: inline-block;
    margin-top: 0.3rem;
    padding: 0.2rem 0.6rem;
    background: rgba(110,118,129,0.15);
    color: #8b949e;
    border-radius: 999px;
    font-size: 11px;
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    border: 1px solid #30363d;
  }
  .stdin-row {
    padding: 0.65rem 1rem;
    background: #161b22;
    border-top: 1px solid #21262d;
    color: #8b949e;
    font-size: 12px;
  }
  .tc-pass {
    background: rgba(35,134,54,0.1);
    border-left: 3px solid #3fb950;
    padding: 9px 13px;
    margin: 4px 0;
    border-radius: 0 8px 8px 0;
    font-size: 13px;
    color: #3fb950;
  }
  .tc-fail {
    background: rgba(248,81,73,0.1);
    border-left: 3px solid #f85149;
    padding: 9px 13px;
    margin: 4px 0;
    border-radius: 0 8px 8px 0;
    font-size: 13px;
    color: #f85149;
  }

  /* ── Toast notifications ─────────────────────────────────────────────── */
  .toast-wrap { position: fixed; right: 16px; bottom: 16px; z-index: 9999; pointer-events: none; }
  .toast {
    background: #161b22;
    color: #e6edf3;
    padding: 12px 18px;
    border-radius: 12px;
    margin-top: 8px;
    font-size: 13px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    border: 1px solid #30363d;
    transform: translateX(120%);
    opacity: 0;
    transition: transform 0.28s cubic-bezier(0.34,1.56,0.64,1), opacity 0.25s;
    pointer-events: auto;
    max-width: 280px;
  }
  .toast.show { transform: translateX(0); opacity: 1; }
  .toast.warn {
    background: rgba(239,68,68,0.15);
    border-color: rgba(239,68,68,0.35);
    color: #f87171;
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(110,118,129,0.3); border-radius: 99px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(110,118,129,0.5); }
</style>
</head>
<body>
  <div id="app"></div>
  <div class="toast-wrap" id="toasts"></div>

<script>
  // ── Streamlit protocol ────────────────────────────────────────────────
  function sendValue(v) {
    window.parent.postMessage(
      { isStreamlitMessage: true, type: "streamlit:setComponentValue",
        value: v, dataType: "json" }, "*");
  }
  function setFrameHeight(h) {
    window.parent.postMessage(
      { isStreamlitMessage: true, type: "streamlit:setFrameHeight", height: h }, "*");
  }
  function componentReady() {
    window.parent.postMessage(
      { isStreamlitMessage: true, type: "streamlit:componentReady", apiVersion: 1 }, "*");
  }
  function autoHeight() { setFrameHeight(document.body.scrollHeight + 8); }
  new ResizeObserver(autoHeight).observe(document.body);

  // ── Toast ─────────────────────────────────────────────────────────────
  function showToast(msg, warn) {
    const wrap = document.getElementById("toasts");
    const t = document.createElement("div");
    t.className = "toast" + (warn ? " warn" : "");
    t.textContent = msg;
    wrap.appendChild(t);
    requestAnimationFrame(() => t.classList.add("show"));
    setTimeout(() => {
      t.classList.remove("show");
      setTimeout(() => t.remove(), 300);
    }, 2400);
  }

  // ── 13-feature extraction (matches ml_model.py exactly) ──────────────
  function computeFeatures(buf) {
    if (!buf || buf.length < 2) return new Array(13).fill(0);
    const dwell = buf.map(k => Math.max(0, k.upTime - k.downTime));
    const flight = [];
    for (let i = 0; i < buf.length - 1; i++) flight.push(buf[i+1].downTime - buf[i].upTime);
    const mean = a => a.reduce((x,y) => x+y, 0) / a.length;
    const std = a => { if (a.length < 2) return 0;
                       const m = mean(a);
                       return Math.sqrt(a.reduce((x,y) => x+(y-m)*(y-m), 0)/a.length); };
    const median = a => { if (!a.length) return 0;
                          const s = [...a].sort((x,y) => x-y);
                          const mid = Math.floor(s.length/2);
                          return s.length % 2 ? s[mid] : (s[mid-1]+s[mid])/2; };
    const pos = flight.filter(f => f >= 0);
    const meanDwell = mean(dwell), stdDwell = std(dwell);
    const medianDwell = median(dwell), maxDwell = Math.max(...dwell);
    const meanFlight = pos.length ? mean(pos) : 0;
    const stdFlight = std(pos), medianFlight = median(pos);
    const minFlight = pos.length ? Math.min(...pos) : 0;
    const nKeys = buf.length;
    const totalTime = Math.max(1, buf[buf.length-1].upTime - buf[0].downTime);
    const wpm = (nKeys/5.0)/(totalTime/60000.0);
    const ratio = meanFlight > 0 ? meanDwell/meanFlight : 0;
    let rhythm = meanDwell > 0 ? 1 - (stdDwell/meanDwell) : 0;
    rhythm = Math.max(0, Math.min(1, rhythm));
    return [meanDwell, stdDwell, medianDwell, maxDwell,
            meanFlight, stdFlight, medianFlight, minFlight,
            wpm, ratio, rhythm, totalTime, nKeys];
  }

  // ── Helpers ───────────────────────────────────────────────────────────
  function attachKeyCapture(el, buffer, bufMax) {
    const down = {};
    el.addEventListener("keydown", e => {
      if (down[e.code] !== undefined) return;
      down[e.code] = performance.now();
    });
    el.addEventListener("keyup", e => {
      const dt = down[e.code];
      if (dt === undefined) return;
      buffer.push({ key: e.key, downTime: dt, upTime: performance.now() });
      if (bufMax && buffer.length > bufMax) buffer.shift();
      delete down[e.code];
    });
  }

  function nonce() { return Date.now().toString(36) + Math.random().toString(36).slice(2,8); }

  function attachCpBlock(el, problemId, kindPaste) {
    /* Block paste/copy/cut + log paste attempts. */
    el.addEventListener("paste", e => {
      e.preventDefault();
      const data = e.clipboardData || window.clipboardData;
      const txt = data ? (data.getData("text") || "") : "";
      showToast("🚫 Paste is disabled here", true);
      sendValue({ nonce: nonce(), kind: kindPaste,
                  question_id: problemId || "", chars: txt.length, event_type: "paste" });
    });
    el.addEventListener("copy",  e => { e.preventDefault(); showToast("⚠ Copy disabled"); });
    el.addEventListener("cut",   e => { e.preventDefault(); showToast("⚠ Cut disabled"); });
    el.addEventListener("contextmenu", e => e.preventDefault());
    el.addEventListener("drop", e => { e.preventDefault(); showToast("⚠ Drop disabled"); });
  }

  function dotColor(c) {
    if (c == null) return "#94a3b8";
    if (c >= 0.65) return "#22c55e";
    if (c >= 0.45) return "#f59e0b";
    return "#ef4444";
  }
  function fmt(ms) {
    ms = Math.max(0, ms);
    const s = Math.floor(ms/1000);
    const m = Math.floor(s/60);
    const ss = (s % 60).toString().padStart(2, "0");
    const mm = m.toString().padStart(2, "0");
    return mm + ":" + ss;
  }
  function escapeHtml(s) {
    return (s == null ? "" : String(s))
      .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
      .replace(/"/g,"&quot;").replace(/'/g,"&#039;");
  }

  // ── Per-render state ─────────────────────────────────────────────────
  const app = document.getElementById("app");
  const state = {
    type: null,
    enrollCounter: -1,
    timerHandle: null,
    checkHandle: null,
    initHandle: null,
    examState: null,
    labState: null,
    labProblemId: null,
  };

  // ── Enrolment widget ─────────────────────────────────────────────────
  function renderEnrollment(args) {
    state.type = "enrollment";
    state.enrollCounter = args.enroll_counter;
    app.innerHTML = `
      <div class="phrase"><b>Phrase to type:</b>
        <div class="phrase-text">${args.phrase}</div></div>
      <div class="progress-line">Progress:
        <b id="prog">${args.enroll_counter}/${args.target}</b></div>
      <input id="typebox" class="txt typebox" placeholder="start typing…" />
      <div class="row">
        <button id="saveBtn" class="btn">Save sample</button>
        <button id="resetBtn" class="btn ghost">Reset</button>
        <span id="msg" class="msg"></span>
      </div>`;
    let buffer = [];
    const box = document.getElementById("typebox");
    attachKeyCapture(box, buffer);
    const msg = document.getElementById("msg");
    document.getElementById("resetBtn").onclick = () => {
      buffer = []; box.value = ""; msg.textContent = "";
      attachKeyCapture(box, buffer);
    };
    document.getElementById("saveBtn").onclick = () => {
      if (box.value.trim() !== args.phrase) { msg.textContent = "Type the phrase exactly."; return; }
      if (buffer.length < 5) { msg.textContent = "Need more keystrokes."; return; }
      sendValue({ nonce: nonce(), kind: "enrollment_sample",
                  username: args.username, features: computeFeatures(buffer) });
      buffer = []; box.value = "";
      msg.textContent = "Sample sent!"; msg.className = "msg ok-msg";
      setTimeout(() => { msg.textContent = ""; msg.className = "msg"; }, 1500);
    };
    box.focus(); autoHeight();
  }
  function updateEnrollment(args) {
    const p = document.getElementById("prog");
    if (p) p.textContent = `${args.enroll_counter}/${args.target}`;
  }

  // ── Login widget ─────────────────────────────────────────────────────
  function renderLogin(args) {
    state.type = "login";
    const opts = (args.user_options || []).map(u =>
      `<option value="${u}"${u === args.default_username ? " selected" : ""}>${u}</option>`
    ).join("");
    app.innerHTML = `
      <label class="lbl">Username</label>
      <select id="user" class="sel">${opts}</select>
      <label class="lbl">Password</label>
      <input id="pw" type="password" class="txt"/>
      <label class="lbl">Type the phrase:</label>
      <div class="phrase-text" style="margin:0.25rem 0 0.4rem 0;">${args.phrase}</div>
      <input id="typebox" class="txt typebox"/>
      <div class="row">
        <button id="loginBtn" class="btn">Authenticate</button>
        <span id="msg" class="msg"></span>
      </div>`;
    let buffer = [];
    const box = document.getElementById("typebox");
    const msg = document.getElementById("msg");
    attachKeyCapture(box, buffer);
    document.getElementById("loginBtn").onclick = () => {
      if (box.value.trim() !== args.phrase) { msg.textContent = "Type the phrase exactly."; return; }
      sendValue({ nonce: nonce(), kind: "login_verify",
                  username: document.getElementById("user").value,
                  password: document.getElementById("pw").value,
                  features: computeFeatures(buffer) });
      msg.textContent = "Verifying…"; msg.className = "msg ok-msg";
    };
    autoHeight();
  }

  // ── Challenge / phrase-verification widget ────────────────────────────
  function renderChallenge(args) {
    state.type = "challenge";
    app.innerHTML = `
      <div class="challenge">
        <h3>🔒 Type the phrase to verify</h3>
        <p>This proves it's you. Confidence must be ≥ 45%.</p>
        <div class="phrase-text">${args.phrase}</div>
        <input id="typebox" class="txt typebox" style="margin-top:0.4rem;"/>
        <div class="row">
          <button id="verifyBtn" class="btn danger">Verify</button>
          <span id="msg" class="msg"></span>
        </div>
      </div>`;
    let buffer = [];
    const box = document.getElementById("typebox");
    attachKeyCapture(box, buffer);
    const msg = document.getElementById("msg");
    document.getElementById("verifyBtn").onclick = () => {
      if (box.value.trim() !== args.phrase) { msg.textContent = "Type the phrase exactly."; return; }
      sendValue({ nonce: nonce(), kind: "verify_phrase",
                  username: args.username, features: computeFeatures(buffer) });
    };
    box.focus(); autoHeight();
  }

  // ── Exam-session widget ──────────────────────────────────────────────
  function renderExamSession(args) {
    state.type = "exam_session";
    state.examState = {
      questions: args.questions || [],
      duration: args.duration_ms,
      startedAt: args.started_at_ms,
      buffer: [],
      checkIntervalMs: args.check_interval_ms || 30000,
      nextCheckAt: Date.now() + (args.check_interval_ms || 30000),
    };
    const lastConf = args.last_confidence;
    const dotc = dotColor(lastConf);
    const confPct = lastConf != null ? (lastConf * 100).toFixed(0) + "%" : "--";
    const initAns = args.initial_answers || {};
    const qHtml = state.examState.questions.map((q, i) => {
      const ans = initAns[q.q_id] || "";
      if (q.type === "MCQ") {
        const opts = ["A","B","C","D"].map((letter, k) => {
          const txt = q.options && q.options[k] ? q.options[k] : "";
          const checked = (ans === letter) ? "checked" : "";
          return `<label class="mcq-opt"><input type="radio" name="opt_${q.q_id}"
                  value="${letter}" data-qid="${q.q_id}" ${checked}/>
                  <span><b>${letter}.</b> ${escapeHtml(txt)}</span></label>`;
        }).join("");
        return `<div class="qcard">
          <div class="qlabel">QUESTION ${i+1}<span class="qmarks">${q.marks||0} m</span></div>
          <div class="qtext">${escapeHtml(q.text)}</div>
          ${opts}
        </div>`;
      } else {
        return `<div class="qcard">
          <div class="qlabel">QUESTION ${i+1}<span class="qmarks">${q.marks||0} m</span></div>
          <div class="qtext">${escapeHtml(q.text)}</div>
          <textarea id="ans_${q.q_id}" data-qid="${q.q_id}" class="ta exam-ta"
                    rows="5">${escapeHtml(ans)}</textarea>
        </div>`;
      }
    }).join("");

    app.innerHTML = `
      <div style="display:flex;justify-content:space-between;align-items:center;
                  margin-bottom:0.6rem;padding:0.4rem 0.2rem;color:#475569;font-size:0.85rem;">
        <div>Continuous verification active · checks every ${(state.examState.checkIntervalMs/1000)|0}s</div>
        <div style="display:flex;gap:0.4rem;align-items:center;">
          <div class="dot" id="examDot"
               style="width:10px;height:10px;border-radius:50%;background:${dotc};
                      box-shadow:0 0 6px ${dotc};"></div>
          <span id="examConfText">conf ${confPct}</span>
          <span style="opacity:0.55;">·</span>
          <span id="examNext">next check --</span>
        </div>
      </div>
      ${qHtml}`;

    // Wire up answer change → push to Python (so it survives reruns)
    const textareas = Array.from(document.querySelectorAll("textarea.exam-ta"));
    const radios = Array.from(document.querySelectorAll("input[type=radio][name^='opt_']"));
    let dirty = false;
    function gatherAnswers() {
      const out = {};
      textareas.forEach(t => { out[t.dataset.qid] = t.value; });
      radios.forEach(r => { if (r.checked) out[r.dataset.qid] = r.value; });
      return out;
    }
    function pushAnswers() {
      sendValue({ nonce: nonce(), kind: "exam_answer", answers: gatherAnswers() });
      dirty = false;
    }
    textareas.forEach(t => {
      attachKeyCapture(t, state.examState.buffer, 600);
      attachCpBlock(t, t.dataset.qid, "exam_cp_event");
      t.addEventListener("input", () => { dirty = true; });
      t.addEventListener("blur", () => { if (dirty) pushAnswers(); });
    });
    radios.forEach(r => r.addEventListener("change", pushAnswers));

    // Continuous-auth timer
    if (state.checkHandle) clearInterval(state.checkHandle);
    if (state.initHandle) clearTimeout(state.initHandle);
    function fireCheck() {
      if (state.examState.buffer.length < 15) {
        state.examState.nextCheckAt = Date.now() + state.examState.checkIntervalMs;
        return;
      }
      const recent = state.examState.buffer.slice(-160);
      sendValue({ nonce: nonce(), kind: "exam_continuous_check",
                  features: computeFeatures(recent),
                  answers: gatherAnswers() });
      state.examState.nextCheckAt = Date.now() + state.examState.checkIntervalMs;
    }
    state.initHandle = setTimeout(() => {
      fireCheck();
      state.checkHandle = setInterval(fireCheck, state.examState.checkIntervalMs);
    }, Math.max(0, state.examState.nextCheckAt - Date.now()));

    if (state.timerHandle) clearInterval(state.timerHandle);
    state.timerHandle = setInterval(() => {
      const t = document.getElementById("examNext");
      if (t) {
        const r = Math.max(0, state.examState.nextCheckAt - Date.now());
        t.textContent = "next check " + (r > 0 ? "in " + fmt(r) : "now");
      }
    }, 500);
    autoHeight();
  }
  function updateExamSession(args) {
    const lastConf = args.last_confidence;
    const dotc = dotColor(lastConf);
    const dot = document.getElementById("examDot");
    const txt = document.getElementById("examConfText");
    if (dot) { dot.style.background = dotc; dot.style.boxShadow = "0 0 6px " + dotc; }
    if (txt) txt.textContent = "conf " + (lastConf != null ? (lastConf*100).toFixed(0) + "%" : "--");
  }

  // ── Lab-session widget (code editor) ─────────────────────────────────
  function renderLabSession(args) {
    state.type = "lab_session";
    state.labProblemId = args.problem_id;
    state.labState = {
      checkIntervalMs: args.check_interval_ms || 30000,
      nextCheckAt: Date.now() + (args.check_interval_ms || 30000),
      buffer: [],
      lastResult: args.last_result || null,
      submitted: false,
    };
    const lastConf = args.last_confidence;
    const dotc = dotColor(lastConf);
    const confPct = lastConf != null ? (lastConf*100).toFixed(0) + "%" : "--";
    const starter = (args.code !== undefined ? args.code : args.starter_code) || "";
    const stdin = args.last_stdin || "";
    const langBadge = args.language || "C++17";

    app.innerHTML = `
      <div class="lab-shell">
        <div class="lab-topbar">
          <div style="display:flex;align-items:center;">
            <span class="lang-pill">${escapeHtml(langBadge)}</span>
            <b>${escapeHtml(args.problem_title || "Problem")}</b>
          </div>
          <div class="lab-status-line">
            <div class="dot" id="labDot"
                 style="width:10px;height:10px;border-radius:50%;
                        background:${dotc};box-shadow:0 0 6px ${dotc};"></div>
            <span id="labConfText">conf ${confPct}</span>
            <span style="opacity:0.55;">·</span>
            <span id="labNext">next check --</span>
          </div>
        </div>
        <div class="editor-row">
          <div class="lineno-strip" id="labLineNos"></div>
          <textarea id="labCode" class="code-area" spellcheck="false"
                    autocorrect="off" autocapitalize="off">${escapeHtml(starter)}</textarea>
        </div>
        <div class="lab-actions">
          <button class="btn-run" id="btnRun">▶ Run</button>
          <button class="btn-submit" id="btnSubmit">⬆ Submit</button>
          <button class="btn-reset" id="btnReset">↺ Reset</button>
          <span class="spacer"></span>
          <button class="stdin-toggle" id="btnToggleStdin">show stdin</button>
        </div>
        <div id="stdinBox" class="stdin-row" style="display:none;">
          <div style="margin-bottom:0.25rem;">Custom stdin (used by Run)</div>
          <textarea id="labStdin" class="stdin-area">${escapeHtml(stdin)}</textarea>
        </div>
        <div id="labOutput"></div>
      </div>`;

    const codeEl = document.getElementById("labCode");
    const stdinEl = document.getElementById("labStdin");
    const lineNos = document.getElementById("labLineNos");

    function renderLineNos() {
      const n = (codeEl.value.match(/\n/g) || []).length + 1;
      let html = ""; for (let i = 1; i <= n; i++) html += i + "<br/>";
      lineNos.innerHTML = html;
    }
    renderLineNos();

    codeEl.addEventListener("keydown", e => {
      if (e.key === "Tab") {
        e.preventDefault();
        const s = codeEl.selectionStart, ePos = codeEl.selectionEnd;
        codeEl.value = codeEl.value.slice(0,s) + "  " + codeEl.value.slice(ePos);
        codeEl.selectionStart = codeEl.selectionEnd = s + 2;
        renderLineNos();
      }
    });
    codeEl.addEventListener("input", renderLineNos);
    attachKeyCapture(codeEl, state.labState.buffer, 600);
    attachKeyCapture(stdinEl, state.labState.buffer, 600);
    attachCpBlock(codeEl, args.problem_id, "lab_paste");
    attachCpBlock(stdinEl, args.problem_id, "lab_paste");

    document.getElementById("btnToggleStdin").onclick = () => {
      const sb = document.getElementById("stdinBox");
      const btn = document.getElementById("btnToggleStdin");
      const showing = sb.style.display !== "none";
      sb.style.display = showing ? "none" : "block";
      btn.textContent = showing ? "show stdin" : "hide stdin";
      autoHeight();
    };
    document.getElementById("btnReset").onclick = () => {
      codeEl.value = args.starter_code || ""; renderLineNos();
    };
    document.getElementById("btnRun").onclick = () => {
      sendValue({ nonce: nonce(), kind: "lab_run",
                  problem_id: args.problem_id, code: codeEl.value,
                  stdin: stdinEl.value, time_limit: args.time_limit || 3 });
      flashStatus("Compiling…");
    };
    document.getElementById("btnSubmit").onclick = () => {
      if (!confirm("Submit code? It will be graded against all hidden tests.")) return;
      sendValue({ nonce: nonce(), kind: "lab_submit",
                  problem_id: args.problem_id, code: codeEl.value });
      flashStatus("Grading…");
    };

    function flashStatus(msg) {
      const out = document.getElementById("labOutput");
      out.innerHTML = `<div class="terminal-output">${escapeHtml(msg)}</div>`;
    }
    renderLabResult(state.labState.lastResult);

    if (state.checkHandle) clearInterval(state.checkHandle);
    if (state.initHandle) clearTimeout(state.initHandle);
    function fireCheck() {
      if (state.labState.buffer.length < 15) {
        state.labState.nextCheckAt = Date.now() + state.labState.checkIntervalMs;
        return;
      }
      const recent = state.labState.buffer.slice(-160);
      sendValue({ nonce: nonce(), kind: "lab_continuous_check",
                  problem_id: args.problem_id,
                  features: computeFeatures(recent) });
      state.labState.nextCheckAt = Date.now() + state.labState.checkIntervalMs;
    }
    state.initHandle = setTimeout(() => {
      fireCheck();
      state.checkHandle = setInterval(fireCheck, state.labState.checkIntervalMs);
    }, Math.max(0, state.labState.nextCheckAt - Date.now()));

    if (state.timerHandle) clearInterval(state.timerHandle);
    state.timerHandle = setInterval(() => {
      const t = document.getElementById("labNext");
      if (t) {
        const r = Math.max(0, state.labState.nextCheckAt - Date.now());
        t.textContent = "next check " + (r > 0 ? "in " + fmt(r) : "now");
      }
    }, 500);
    autoHeight();
  }

  function renderLabResult(res) {
    const out = document.getElementById("labOutput");
    if (!out) return;
    if (!res) { out.innerHTML = ""; autoHeight(); return; }
    let body = "";
    if (res.compile_error) {
      body += `<div class="compile-error">${escapeHtml(res.compile_error)}</div>`;
    } else if (res.kind === "submit") {
      const rows = (res.results || []).map((r, i) => {
        const cls = r.status === "pass" ? "tc-pass" : "tc-fail";
        return `<div class="${cls}">
          <b>Test ${i+1}</b> — ${r.status === "pass" ? "✅ pass" : "❌ fail"}
          (${r.awarded}/${r.points} pts)
          ${r.status === "fail" ? `<div style="color:#94a3b8;margin-top:0.25rem;">
            <b>Got:</b> <code>${escapeHtml(r.got || "")}</code>
            &nbsp;<b>Expected:</b> <code>${escapeHtml(r.expected || "")}</code>
          </div>` : ""}
        </div>`;
      }).join("");
      body += `<div style="padding:14px;background:#11111b;color:#cdd6f4;
                          border-radius:0 0 10px 10px;border-top:1px solid #313244;">
        <div style="font-weight:700;margin-bottom:0.5rem;">
          Score: ${res.score}/${res.max_score} pts
          &nbsp;·&nbsp; ${res.passed}/${res.total} test cases passed
        </div>
        ${rows}
        ${res.engine_used ? `<div class="engine-pill">Compiled via ${escapeHtml(res.engine_used)}</div>` : ""}
      </div>`;
    } else {
      body += `<div class="terminal-output">${escapeHtml(res.stdout || "(no output)")}` +
              (res.stderr ? "\n--- stderr ---\n" + escapeHtml(res.stderr) : "") + `</div>`;
      if (res.engine_used) {
        body += `<div style="padding:6px 14px;background:#11111b;
                              border-top:1px solid #313244;border-radius:0 0 10px 10px;">
                   <span class="engine-pill">Compiled via ${escapeHtml(res.engine_used)}</span>
                 </div>`;
      }
    }
    out.innerHTML = body; autoHeight();
  }

  function updateLabSession(args) {
    const lastConf = args.last_confidence;
    const dotc = dotColor(lastConf);
    const dot = document.getElementById("labDot");
    const txt = document.getElementById("labConfText");
    if (dot) { dot.style.background = dotc; dot.style.boxShadow = "0 0 6px " + dotc; }
    if (txt) txt.textContent = "conf " + (lastConf != null ? (lastConf*100).toFixed(0) + "%" : "--");
    if (args.last_result) renderLabResult(args.last_result);
  }

  // ── Router ────────────────────────────────────────────────────────────
  function onRender(event) {
    if (!event.data || event.data.type !== "streamlit:render") return;
    const args = event.data.args || {};
    const t = args.widget_type;
    if (t === "enrollment") {
      if (state.type !== "enrollment" || state.enrollCounter !== args.enroll_counter)
        renderEnrollment(args);
      else updateEnrollment(args);
    } else if (t === "login") {
      if (state.type !== "login") renderLogin(args);
    } else if (t === "challenge") {
      if (state.type !== "challenge") renderChallenge(args);
    } else if (t === "exam_session") {
      if (state.type !== "exam_session") renderExamSession(args);
      else updateExamSession(args);
    } else if (t === "lab_session") {
      if (state.type !== "lab_session" || state.labProblemId !== args.problem_id)
        renderLabSession(args);
      else updateLabSession(args);
    } else {
      app.innerHTML = ""; state.type = null;
    }
    autoHeight();
  }
  window.addEventListener("message", onRender);
  componentReady();
</script>
</body>
</html>
